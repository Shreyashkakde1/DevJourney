services:

  #  rabbit:
  #    image: rabbitmq:4-management
  #    hostname: rabbitmq
  #    ports:
  #      - "5672:5672"
  #      - "15672:15672"
  #    healthcheck:
  #      test: rabbitmq-diagnostics check_port_connectivity
  #      interval: 10s
  #      timeout: 5s
  #      retries: 10
  #      start_period: 5s
  #    extends:
  #      file: common-config.yml
  #      service: network-deploy-service


  accountsdb:
    container_name: accountsdb
    ports:
      - "5432:5432"
    extends:
      file: common-config.yml
      service: microservice-db-config
    environment:
      POSTGRES_DB: accountsdb

  cardsdb:
    container_name: cardsdb
    ports:
      - "5434:5432"
    extends:
      file: common-config.yml
      service: microservice-db-config
    environment:
      POSTGRES_DB: cardsdb


  loansdb:
    container_name: loansdb
    ports:
      - "5435:5432"
    extends:
      file: common-config.yml
      service: microservice-db-config
    environment:
      POSTGRES_DB: loansdb

  configserver:
    image: "shreyash/configserver:s7"
    container_name: configserver-ms
    ports:
      - "8071:8071"
    #    depends_on:
    #      rabbit:
    #        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config


  accounts:
    image: "shreyash/accounts:s7"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy
      accountsdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://accountsdb:5432/accountsdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-configserver-config

  loans:
    image: "shreyash/loans:s7"
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      configserver:
        condition: service_healthy
      loansdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://loansdb:5432/loansdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-configserver-config


  cards:
    image: "shreyash/cards:s7"
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_healthy
      cardsdb:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://cardsdb:5432/cardsdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-configserver-config


networks:
  shreyashbank:
    driver: "bridge"


#              🌐 Host Machine (Your PC)
#              -------------------------------------------------
#              |                                               |
#              |   http://localhost:8080   http://localhost:8090   http://localhost:9000
#              |           │                        │                      │
#              |           ▼                        ▼                      ▼
#              |     ┌────────────┐         ┌────────────┐        ┌────────────┐
#              |     │  accounts  │         │   loans    │        │   cards    │
#              |     │  (8080)    │         │  (8090)    │        │  (9000)    │
#              |     │ accounts-ms│         │ loans-ms   │        │ cards-ms   │
#              |     └─────┬──────┘         └─────┬──────┘        └─────┬──────┘
#              |           │                      │                     │
#              |           └──────────┬───────────┴──────────┬──────────┘
#              |                      │                      │
#              |              🌐 Docker Network
#              |                 (bridge)
#              |              "shreyashbank"
#              |                                               |
#              -------------------------------------------------