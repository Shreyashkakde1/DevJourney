  shreyashbankdb:
    container_name: shreyashbankdb
    ports:
      - "5432:5432"
    extends:
      file: common-config.yml
      service: microservice-db-config
    environment:
      POSTGRES_DB: shreyashbankdb

#  accountsdb:
#    container_name: accountsdb
#    ports:
#      - "5432:5432"
#    extends:
#      file: common-config.yml
#      service: microservice-db-config
#    environment:
#      POSTGRES_DB: accountsdb

#  cardsdb:
#    container_name: cardsdb
#    ports:
#      - "5434:5432"
#    extends:
#      file: common-config.yml
#      service: microservice-db-config
#    environment:
#      POSTGRES_DB: cardsdb
#
#
#  loansdb:
#    container_name: loansdb
#    ports:
#      - "5435:5432"
#    extends:
#      file: common-config.yml
#      service: microservice-db-config
#    environment:
#      POSTGRES_DB: loansdb

  configserver:
    image: "shreyash/configserver:s9"
    container_name: configserver-ms
    ports:
      - "8071:8071"
#    depends_on:
#      rabbit:
#        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8071/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-base-config

  eurekaserver:
    image: "shreyash/eurekaserver:s9"
    container_name: eurekaserver-ms
    ports:
      - "8070:8070"
    depends_on:
      configserver:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "eurekaserver"
    healthcheck:
      test: "curl --fail --silent localhost:8070/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    extends:
      file: common-config.yml
      service: microservice-configserver-config


  accounts:
    image: "shreyash/accounts:s9"
    container_name: accounts-ms
    ports:
      - "8080:8080"
    depends_on:
      configserver:
        condition: service_healthy
      shreyashbankdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
        test: "curl --fail --silent localhost:8080/actuator/health/readiness | grep UP || exit 1"
        interval: 10s
        timeout: 5s
        retries: 10
        start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "accounts"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://shreyashbankdb:5432/shreyashbankdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  loans:
    image: "shreyash/loans:s9"
    container_name: loans-ms
    ports:
      - "8090:8090"
    depends_on:
      configserver:
        condition: service_healthy
      shreyashbankdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:8090/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "loans"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://shreyashbankdb:5432/shreyashbankdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-eureka-config


  cards:
    image: "shreyash/cards:s9"
    container_name: cards-ms
    ports:
      - "9000:9000"
    depends_on:
      configserver:
        condition: service_healthy
      shreyashbankdb:
        condition: service_healthy
      eurekaserver:
        condition: service_healthy
    healthcheck:
      test: "curl --fail --silent localhost:9000/actuator/health/readiness | grep UP || exit 1"
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s
    environment:
      SPRING_APPLICATION_NAME: "cards"
      SPRING_DATASOURCE_URL: "jdbc:postgresql://shreyashbankdb:5432/shreyashbankdb"
      JAVA_TOOL_OPTIONS: "-Duser.timezone=Asia/Kolkata"
      TZ: Asia/Kolkata
    extends:
      file: common-config.yml
      service: microservice-eureka-config

  gatewayserver:
    image: "shreyash/gatewayserver:s9"
    container_name: gatewayserver-ms
    ports:
      - "8072:8072"
    depends_on:
      accounts:
        condition: service_healthy
      loans:
        condition: service_healthy
      cards:
        condition: service_healthy
    environment:
      SPRING_APPLICATION_NAME: "gatewayserver"
    extends:
      file: common-config.yml
      service: microservice-eureka-config

networks:
  shreyashbank:
    driver: "bridge"


#              🌐 Host Machine (Your PC)
#              -------------------------------------------------
#              |                                               |
#              |   http://localhost:8080   http://localhost:8090   http://localhost:9000
#              |           │                        │                      │
#              |           ▼                        ▼                      ▼
#              |     ┌────────────┐         ┌────────────┐        ┌────────────┐
#              |     │  accounts  │         │   loans    │        │   cards    │
#              |     │  (8080)    │         │  (8090)    │        │  (9000)    │
#              |     │ accounts-ms│         │ loans-ms   │        │ cards-ms   │
#              |     └─────┬──────┘         └─────┬──────┘        └─────┬──────┘
#              |           │                      │                     │
#              |           └──────────┬───────────┴──────────┬──────────┘
#              |                      │                      │
